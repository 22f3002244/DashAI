services:
  - type: web
    name: dash-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
